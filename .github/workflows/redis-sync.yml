name: Redis Multi-Arch Sync to Release

on:
  workflow_dispatch: #仅开启手动触发
    inputs:
      redis_version:
        description: "Redis version (e.g. 8.6.0)"
        required: true
        default: "8.6.3"

      arch:
        description: "Target architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - amd64

      variant:
        description: "Image variant"
        required: true
        default: "alpine"
        type: choice
        options:
          - alpine
          - bookworm

jobs:
  redis-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Set Image Variables
        id: vars
        run: |
          IMAGE_TAG="${{ inputs.redis_version }}-${{ inputs.variant }}"
          ARCHIVE_NAME="redis-${{ inputs.redis_version }}-${{ inputs.arch }}.tar"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT

      - name: Pull and Save Redis Image
        run: |
          skopeo copy \
            --override-os linux \
            --override-arch ${{ inputs.arch }} \
            docker://docker.io/library/redis:${{ steps.vars.outputs.image_tag }} \
            docker-archive:${{ steps.vars.outputs.archive_name }}:redis:${{ steps.vars.outputs.image_tag }}

      - name: Compress Archive
        run: |
          gzip -9 ${{ steps.vars.outputs.archive_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: redis-${{ inputs.redis_version }}-${{ inputs.arch }}-${{ github.run_number }}
          name: Redis ${{ inputs.redis_version }} (${{ inputs.arch }})
          body: |
            Redis ${{ inputs.redis_version }}-${{ inputs.variant }}
            Architecture: ${{ inputs.arch }}
            OS: Linux
            Format: Docker Archive (.tar.gz)

            Compatible with Kylin / UOS / openEuler / Rocky / Alma
          files: ${{ steps.vars.outputs.archive_name }}.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
