name: Redis ARM64 Sync to Release

on:
  workflow_dispatch:
    inputs:
      redis_version:
        description: "Redis version (e.g. 8.6.0)"
        required: true
        default: "8.6.0"

      arch:
        description: "Target architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - amd64

jobs:
  redis-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Pull and Save Redis Image
        run: |
          set -euxo pipefail

          skopeo copy \
            --override-os linux \
            --override-arch ${{ inputs.arch }} \
            docker://docker.io/library/redis:${{ inputs.redis_version }}-alpine \
            docker-archive:redis-${{ inputs.redis_version }}-${{ inputs.arch }}.tar:redis:${{ inputs.redis_version }}-alpine

          gzip -9 redis-${{ inputs.redis_version }}-${{ inputs.arch }}.tar

      - name: Create Release and Upload Tar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: redis-${{ inputs.redis_version }}-${{ inputs.arch }}-${{ github.run_number }}
          name: Redis ${{ inputs.redis_version }} ${{ inputs.arch }} Release
          body: |
            Redis ${{ inputs.redis_version }}-alpine for ${{ inputs.arch }}
            Architecture: ${{ inputs.arch }}
            Format: Docker Archive (.tar)
          files: redis-${{ inputs.redis_version }}-${{ inputs.arch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
