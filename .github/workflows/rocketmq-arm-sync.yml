name: RocketMQ Multi-Arch Sync to Release

on:
  workflow_dispatch:
    inputs:
      rocketmq_version:
        description: "RocketMQ version (e.g. 5.3.4)"
        required: true
        default: "5.3.4"

      dashboard_version:
        description: "RocketMQ Dashboard version (e.g. 2.1.0)"
        required: true
        default: "2.1.0"

      arch:
        description: "Target architecture"
        required: true
        default: "amd64"
        type: choice
        options:
          - amd64
          - arm64

jobs:
  rocketmq-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Set Output Variables
        id: vars
        run: |
          echo "rocketmq_tar=rocketmq-${{ inputs.rocketmq_version }}-${{ inputs.arch }}.tar" >> $GITHUB_OUTPUT
          echo "dashboard_tar=rocketmq-dashboard-${{ inputs.dashboard_version }}-${{ inputs.arch }}.tar" >> $GITHUB_OUTPUT

      - name: Pull and Save RocketMQ Images
        run: |
          set -euxo pipefail

          echo "=== Export RocketMQ ${{ inputs.rocketmq_version }} (${{ inputs.arch }}) ==="
          skopeo copy \
            --override-os linux \
            --override-arch ${{ inputs.arch }} \
            docker://docker.io/apache/rocketmq:${{ inputs.rocketmq_version }} \
            docker-archive:${{ steps.vars.outputs.rocketmq_tar }}:apache/rocketmq:${{ inputs.rocketmq_version }}

          gzip -9f ${{ steps.vars.outputs.rocketmq_tar }}

          echo "=== Export RocketMQ Dashboard ${{ inputs.dashboard_version }} (${{ inputs.arch }}) ==="
          skopeo copy \
            --override-os linux \
            --override-arch ${{ inputs.arch }} \
            docker://docker.io/apacherocketmq/rocketmq-dashboard:${{ inputs.dashboard_version }} \
            docker-archive:${{ steps.vars.outputs.dashboard_tar }}:apacherocketmq/rocketmq-dashboard:${{ inputs.dashboard_version }}

          gzip -9f ${{ steps.vars.outputs.dashboard_tar }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rocketmq-${{ inputs.rocketmq_version }}-${{ inputs.arch }}-${{ github.run_number }}
          name: RocketMQ ${{ inputs.rocketmq_version }} (${{ inputs.arch }})
          body: |
            RocketMQ Docker Images (Multi-Arch Ready)

            ✅ Included:
            - apache/rocketmq:${{ inputs.rocketmq_version }}
            - apacherocketmq/rocketmq-dashboard:${{ inputs.dashboard_version }}

            Architecture: ${{ inputs.arch }}
            OS: Linux
            Format: docker-archive (.tar.gz)

            Compatible with:
            - Kylin V10 SP3
            - OpenEuler
            - UOS / UnionTech
            - x86_64 / ARM64 servers
          files: |
            ${{ steps.vars.outputs.rocketmq_tar }}.gz
            ${{ steps.vars.outputs.dashboard_tar }}.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
